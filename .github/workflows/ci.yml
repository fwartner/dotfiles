name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  workflow_dispatch:

jobs:
  test-on-system:
    runs-on: macos-latest

    steps:
      - name: Clone repository
        run: git clone git@github.com:fwartner/dotfiles.git ~/.dotfiles

      - name: Run installer
        run: ~/.dotfiles/install.sh
